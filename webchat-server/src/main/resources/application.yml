server:
  port: 9876

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: webchat-server

  datasource:
    url: jdbc:mysql://localhost:3306/webchat?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false          # Prevent lazy-loading issues in REST controllers
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Producer config still used by Spring auto-configuration (kept as fallback)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      properties:
        linger.ms: 0
    # Listener factory is disabled — we use Reactor Kafka (KafkaReceiver) for consuming
    listener:
      auto-startup: false

jwt:
  secret: mySecretKeyForWebChatApplicationThisIsAVeryLongSecretKeyForJWTEncryption
  expiration: 86400000           # 24 hours in milliseconds

# CORS allowed origins — override per environment (dev/staging/prod)
# e.g. set cors.allowed-origins=https://app.example.com in prod
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:9876

# Token cleanup schedule override (optional — defaults to AppConstants.TOKEN_CLEANUP_RATE_MS)
# token:
#   cleanup:
#     rate-ms: 3600000

logging:
  level:
    root: INFO
    au.com.example.webchat.server: DEBUG
